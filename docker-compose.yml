services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: msvi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d msvi"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/msvi
      MSRC_API_BASE_URL: https://api.msrc.microsoft.com/cvrf/v3.0/cvrf
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
  collector:
    build: ./collector
    restart: "no"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/msvi
      MSRC_API_BASE_URL: https://api.msrc.microsoft.com/cvrf/v3.0/cvrf
    depends_on:
      postgres:
        condition: service_healthy

  collector-scheduler:
    build: ./collector
    restart: unless-stopped
    command: ["sh", "-c", "while true; do python sync.py; sleep 86400; done"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/msvi
      MSRC_API_BASE_URL: https://api.msrc.microsoft.com/cvrf/v3.0/cvrf
    depends_on:
      postgres:
        condition: service_healthy
        
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
      
  enrichment-scheduler:
    build: ./collector
    restart: unless-stopped
    environment:
      NVD_API_KEY: ${NVD_API_KEY:-}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/msvi
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "while true; do
        python enrich.py;
        sleep 86400;
      done"
      
volumes:
  postgres_data:
